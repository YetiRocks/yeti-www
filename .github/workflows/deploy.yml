name: Deploy

# yeti-www is the canonical aggregator deploy: root_app `www` plus the
# autoLoad bundle declared in yeti-config.yaml (yeti-documentation +
# the demo-* sites). The unified workflow at
# YetiRocks/yeti-workflows/.github/workflows/yeti-app-deploy.yml handles
# the whole pipeline: download yeti CLI → mirror this repo + clone the
# autoLoad bundle → npm-build every frontend → `yeti --buildonly` to
# scaffold + production-profile compile → scp + systemd restart.
#
# SAFETY GATE — DRY-RUN IS DEFAULT (temporary):
# Until the new yeti binary is published to Linode + the unified
# pipeline is verified end-to-end, every trigger defaults to dry-run.
# Real deploys require explicit `workflow_dispatch` with
# `dry_run: false` from the Actions UI. Flip the input default + the
# expression below back to "push deploys real" once the gate clears.
#
# - push to main → dry_run: true (was: real deploy)
# - PR opened → dry_run: true
# - workflow_dispatch with no override → dry_run: true (was: real deploy)
# - workflow_dispatch with dry_run: false → real deploy (only path)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + package only; skip scp + systemd restart. Default true while the safety gate is on."
        type: boolean
        default: true

jobs:
  deploy:
    uses: YetiRocks/yeti-workflows/.github/workflows/yeti-app-deploy.yml@main
    with:
      service_name: yeti
      service_description: "Yeti Application Platform (yeti-www aggregator)"
      dry_run: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != false }}
    secrets: inherit
