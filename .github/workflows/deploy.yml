name: Deploy yetirocks.com

# Geo-distributed sovereign deploy: builds yeti-www + its autoLoad
# bundle once per matrix entry and ships the package to each origin
# in parallel. Cloudflare proxies yetirocks.com → these 3 IPs.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + package but skip scp + systemd restart"
        type: boolean
        default: false
  # NOTE: push trigger intentionally omitted on initial landing — we manually
  # trigger the first deploy via `gh workflow run` to ensure v0.10.0 has
  # published. Add `push: branches: [main]` once continuous deploy is desired.

jobs:
  deploy:
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: "dallas",    host: "45.56.120.12"    }
          - { name: "frankfurt", host: "172.104.138.204" }
          - { name: "mumbai",    host: "172.105.54.91"   }
    uses: YetiRocks/yeti-workflows/.github/workflows/yeti-app-deploy.yml@main
    with:
      service_description: "Yeti Application Platform (yetirocks.com — ${{ matrix.target.name }})"
      dry_run: ${{ inputs.dry_run || false }}
    secrets:
      DEPLOY_HOST: ${{ matrix.target.host }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GH_PAT: ${{ secrets.GH_PAT }}
