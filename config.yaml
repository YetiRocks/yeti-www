name: "Website"
app_id: "www"
version: "1.0.0"
description: "yetirocks.com marketing site + demos"
route_prefix: "/"

schemas:
  - schemas/schema.graphql

static_files:
  path: web
  route: /
  index: index.html
  notFound:
    file: index.html
    statusCode: 200
  build:
    sourceDir: source
    command: npm run build
